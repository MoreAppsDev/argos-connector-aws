AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Argos V2 — connector AWS CloudTrail. Captura eventos de segurança via
  EventBridge, filtra no edge e envia (assinado com HMAC) ao endpoint de
  ingestão do Argos. Deploy recomendado em us-east-1 (eventos de console
  sign-in são globais e emitidos lá).

Parameters:
  IngestUrl:
    Type: String
    Description: Endpoint de ingestão do Argos.
    Default: https://argos.moreapps.com.br/api/ingest/security-event
  SourceConnectionId:
    Type: String
    Description: UUID da source_connection criada no painel Argos (/admin/sources).
  HmacSecret:
    Type: String
    NoEcho: true
    Description: Secret HMAC exibido uma única vez ao criar a fonte no painel.

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: nodejs20.x

Resources:
  ArgosCloudTrailConnector:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: argos-cloudtrail-connector
      Handler: index.handler
      CodeUri: src/
      Description: Filtra eventos CloudTrail e envia ao Argos (HMAC).
      # A varredura de postura enumera a conta (mais chamadas) → mais tempo/memória.
      Timeout: 120
      MemorySize: 256
      # SecurityAudit = política gerenciada READ-ONLY (describe/list/get). Sem
      # permissão de escrita — o connector nunca altera nada na conta do cliente.
      Policies:
        - arn:aws:iam::aws:policy/SecurityAudit
      Environment:
        Variables:
          ARGOS_INGEST_URL: !Ref IngestUrl
          ARGOS_SOURCE_CONNECTION_ID: !Ref SourceConnectionId
          ARGOS_HMAC_SECRET: !Ref HmacSecret
      Events:
        # Console sign-in (root_login, console_login_no_mfa) — eventos globais.
        ConsoleSignIn:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.signin
              detail-type:
                - AWS Console Sign In via CloudTrail
        # Chamadas de API de segurança (IAM/S3/EC2/KMS/CloudTrail). O EventBridge
        # casa (source ∈ lista) E (eventName ∈ lista) — como os nomes de evento são
        # únicos por serviço, uma regra só cobre todos sem cruzar indevidamente.
        SecurityApiCalls:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.iam
                - aws.s3
                - aws.ec2
                - aws.kms
                - aws.cloudtrail
              detail-type:
                - AWS API Call via CloudTrail
              detail:
                eventName:
                  # IAM — escalonamento / persistência
                  - AttachUserPolicy
                  - AttachRolePolicy
                  - AttachGroupPolicy
                  - CreateLoginProfile
                  - CreateUser
                  - CreateAccessKey
                  # S3 — exposição pública
                  - PutBucketAcl
                  - PutObjectAcl
                  - PutBucketPolicy
                  # EC2 — porta aberta ao mundo
                  - AuthorizeSecurityGroupIngress
                  # KMS — destruição de chave
                  - DisableKey
                  - ScheduleKeyDeletion
                  # CloudTrail — cobrir rastros (desligar auditoria)
                  - StopLogging
                  - DeleteTrail
                  - UpdateTrail
        # Heartbeat (liveness): pinga o Argos a cada 15 min mesmo sem evento, pra
        # o painel distinguir "vivo e quieto" de "offline".
        Heartbeat:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Description: Heartbeat do connector Argos (prova de vida).
        # Varredura de postura (Tema O): 1x/dia enumera a conta (read-only) e
        # manda o snapshot. Input marca o disparo pra distinguir do heartbeat.
        PostureScan:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)
            Description: Varredura de postura do Argos (CSPM read-only).
            Input: '{"argos":"scan"}'

Outputs:
  FunctionName:
    Description: Nome da função Lambda do connector.
    Value: !Ref ArgosCloudTrailConnector
  FunctionArn:
    Description: ARN da função.
    Value: !GetAtt ArgosCloudTrailConnector.Arn
